# 🦊 claudeSam KAIROS Configuration
# Copy to ~/.claude-sam/config.toml

[kairos]
# 메모리 정리 최소 간격 (시간)
min_hours = 24
# 메모리 정리 최소 세션 수
min_sessions = 5
# 메모리 디렉토리 (선택)
# memory_path = "/custom/path/memory"

[notifications]
# iMessage 수신자
# imessage = "+821012345678"

# Telegram 설정
# [notifications.telegram]
# bot_token = "123456:ABC-DEF"
# chat_id = "123456789"

# Discord Webhook
# discord_webhook = "https://discord.com/api/webhooks/..."

[github]
# Webhook Secret (GitHub에서 설정한 것과 동일)
# webhook_secret = "your-secret"
# 감시할 저장소 목록
repos = []

[server]
# HTTP 서버 포트
port = 3847
# 바인드 주소
bind = "0.0.0.0"
